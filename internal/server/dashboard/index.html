<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>audr — local dashboard</title>
<link rel="stylesheet" href="dashboard.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230e0e0c'/%3E%3Ctext x='16' y='22' font-family='monospace' font-size='18' font-weight='600' text-anchor='middle' fill='%23f5f5f0'%3EA%3C/text%3E%3C/svg%3E">
</head>
<body>

<header class="topbar" role="banner">
  <div class="brand">A U D R</div>
  <div class="state-indicator" id="state-indicator" aria-live="polite">
    <span class="pulse-dot" id="state-dot"></span>
    <span id="state-label">CONNECTING</span>
    <span class="state-meta" id="state-meta"></span>
  </div>
  <div class="scan-status" id="scan-status"></div>
  <nav class="topbar-nav" aria-label="Primary">
    <a class="nav-link" data-route="/policy/edit" href="/policy/edit" title="Edit rules, severity overrides, allowlists, and suppressions">POLICY</a>
  </nav>
</header>

<section class="banner-stack" id="banners" aria-live="polite"></section>

<section class="scan-progress" id="scan-progress">
  <div class="scan-progress-label">
    <span class="spinner" aria-hidden="true"></span>
    <span id="scan-progress-text">STARTING UP</span>
    <span class="scan-progress-sub" id="scan-progress-sub"></span>
  </div>
  <ol class="scan-progress-categories" id="scan-progress-categories"></ol>
</section>

<section class="metrics" id="metrics">
  <div class="metric">
    <div class="metric-num" id="m-open">—</div>
    <div class="metric-label">Open findings</div>
    <div class="metric-context" id="m-context"></div>
  </div>
  <div class="metric"><div class="metric-num crit" id="m-crit">—</div><div class="metric-label">Critical</div></div>
  <div class="metric"><div class="metric-num high" id="m-high">—</div><div class="metric-label">High</div></div>
  <div class="metric"><div class="metric-num ok" id="m-resolved">—</div><div class="metric-label">Resolved today</div></div>
</section>

<!-- Project tabs row. Hidden when there's only one project. -->
<section class="tabrow" id="tabrow" aria-label="Project tabs" hidden>
  <div class="tabrow-scroll-wrap">
    <div class="tabrow-scroll" id="tabrow-tabs"></div>
  </div>
  <button class="tab-search" id="search-trigger" title="Jump to project">
    <svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="14.5" y2="14.5"/></svg>
    <span>jump to project</span>
    <span class="kbd">/</span>
  </button>
</section>

<!-- OTHER LOCATIONS group: collapsed by default, auto-expands when
     it contains a critical or high finding (D11 of the design). -->
<section class="noise-group" id="noise-toggle" data-expanded="false" hidden>
  <span class="chev" aria-hidden="true"></span>
  <span class="noise-title">Other locations</span>
  <span class="noise-count" id="noise-count"></span>
  <span class="noise-warn" id="noise-warn"></span>
</section>
<section class="noise-expanded" id="noise-expanded">
  <div class="tabrow">
    <div class="tabrow-scroll-wrap">
      <div class="tabrow-scroll" id="noise-tabs"></div>
    </div>
  </div>
</section>

<section class="filters" aria-label="Filters">
  <div class="filter-group" id="filter-category" role="group" aria-label="Category">
    <button class="filter-btn active" data-filter="category" data-value="all">ALL</button>
    <button class="filter-btn" data-filter="category" data-value="ai-agent">AI-AGENT</button>
    <button class="filter-btn" data-filter="category" data-value="deps">DEPS</button>
    <button class="filter-btn" data-filter="category" data-value="secrets">SECRETS</button>
    <button class="filter-btn" data-filter="category" data-value="os-pkg">OS-PKG</button>
  </div>
  <div class="filter-group" id="filter-severity" role="group" aria-label="Severity">
    <button class="filter-btn active" data-filter="severity" data-value="all">ALL</button>
    <button class="filter-btn" data-filter="severity" data-value="critical">CRIT</button>
    <button class="filter-btn" data-filter="severity" data-value="high">HIGH</button>
    <button class="filter-btn" data-filter="severity" data-value="medium">MED</button>
    <button class="filter-btn" data-filter="severity" data-value="low">LOW</button>
  </div>
</section>

<main class="findings" id="findings" aria-live="polite" aria-busy="true">
  <div class="empty" id="loading">loading…</div>
</main>

<!-- Project switcher modal (D8 of the design — keyboard-driven type-to-jump). -->
<div class="switcher-overlay" id="switcher" hidden role="dialog" aria-modal="true" aria-label="Jump to project">
  <div class="switcher">
    <input class="switcher-input" id="switcher-input" placeholder="jump to project…" autocomplete="off">
    <div class="switcher-list" id="switcher-list"></div>
    <div class="switcher-hint">
      <span><span class="kbd">↑↓</span> navigate</span>
      <span><span class="kbd">↵</span> select</span>
      <span><span class="kbd">esc</span> close</span>
    </div>
  </div>
</div>

<footer class="footer">
  <div>audr · <span id="version">unknown</span> · token authenticated</div>
  <div><a href="#" id="reload">reload</a> · <a href="/healthz" target="_blank">/healthz</a></div>
</footer>

<script src="dashboard.js"></script>
</body>
</html>
